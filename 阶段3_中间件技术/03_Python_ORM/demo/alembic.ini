# Alembic 配置文件（演示用）
# 完整 Alembic 迁移请参考 README.md 中的操作步骤

[alembic]
# 数据库连接字符串（切换 MySQL 只需修改这里）
sqlalchemy.url = sqlite:///./alembic_demo.db
# sqlalchemy.url = mysql+pymysql://root:123456@localhost:3306/orm_demo

script_location = alembic
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
