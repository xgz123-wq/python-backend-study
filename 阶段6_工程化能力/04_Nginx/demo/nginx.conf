# =============================================================================
# Nginx 完整配置示例（带详细中文注释）
# =============================================================================
# 本文件演示一份生产级别的 Nginx 配置，涵盖：
#   1. 全局设置与性能优化
#   2. gzip 压缩
#   3. 负载均衡 upstream
#   4. HTTP → HTTPS 重定向
#   5. HTTPS 配置（SSL/TLS）
#   6. 反向代理 FastAPI 应用
#   7. 静态文件托管
#   8. 限流配置
#   9. WebSocket 代理
#   10. 日志配置
#
# 使用方式：
#   1. 将此文件复制到 /etc/nginx/conf.d/mysite.conf
#   2. 根据实际环境修改域名、端口、路径
#   3. 执行 sudo nginx -t 测试语法
#   4. 执行 sudo nginx -s reload 重载配置
# =============================================================================

# ===== 全局块（main）=====

# 运行 Nginx worker 进程的系统用户
# Ubuntu/Debian 默认 www-data，CentOS 默认 nginx
user www-data;

# worker 进程数量
# auto = 自动检测 CPU 核心数，每个核心一个 worker
worker_processes auto;

# 全局错误日志路径和级别
# 级别：debug | info | notice | warn | error | crit | alert | emerg
error_log /var/log/nginx/error.log warn;

# Nginx 主进程 PID 文件路径
pid /run/nginx.pid;

# 每个 worker 可打开的最大文件描述符数
# 建议与 worker_connections 一致或更大
worker_rlimit_nofile 65535;


# ===== 事件块（events）=====
events {
    # 每个 worker 进程的最大并发连接数
    # 总并发连接数 = worker_processes × worker_connections
    worker_connections 4096;

    # Linux 推荐使用 epoll 事件模型（高性能）
    # FreeBSD/macOS 使用 kqueue
    use epoll;

    # 允许一个 worker 同时接受多个连接
    multi_accept on;
}


# ===== HTTP 块 =====
http {

    # ---------- 基础设置 ----------

    # 引入 MIME 类型映射文件（决定文件用什么 Content-Type 返回）
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 隐藏 Nginx 版本号（安全加固，防止针对性攻击）
    server_tokens off;

    # 启用 sendfile 系统调用（高效传输静态文件，不经过用户态内存）
    sendfile on;

    # 配合 sendfile 使用，在数据包达到一定大小后再发送（减少网络包数量）
    tcp_nopush on;
    tcp_nodelay on;

    # 长连接超时时间（秒）
    # 客户端在 65 秒内没有新请求则断开连接
    keepalive_timeout 65;

    # 允许上传的最大文件大小（默认 1MB，上传文件时需要调大）
    client_max_body_size 50m;


    # ---------- gzip 压缩 ----------

    gzip on;                              # 开启 gzip 压缩
    gzip_min_length 1k;                   # 小于 1KB 的文件不压缩（压缩收益低）
    gzip_comp_level 6;                    # 压缩级别 1-9（6 是性能与压缩率的平衡点）
    gzip_vary on;                         # 添加 Vary: Accept-Encoding 头
    gzip_proxied any;                     # 对所有代理请求也启用 gzip
    gzip_types                            # 需要压缩的 MIME 类型
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    # 注意：不要对图片（JPEG/PNG）和视频开启 gzip，它们已经是压缩格式


    # ---------- 限流配置 ----------

    # 定义限流区域：按客户端 IP 限流，每秒 10 个请求
    # 10m 共享内存 ≈ 可记录 16 万个 IP 的限流状态
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 定义限并发区域：按客户端 IP 限制并发连接数
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # 限流返回 429 而不是默认的 503
    limit_req_status 429;
    limit_conn_status 429;


    # ---------- 日志格式 ----------

    # 自定义 JSON 格式日志（便于 ELK / Loki 等日志系统解析）
    log_format json_log escape=json '{'
        '"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"request": "$request",'
        '"status": $status,'
        '"body_bytes_sent": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"upstream_response_time": "$upstream_response_time",'
        '"http_user_agent": "$http_user_agent"'
    '}';

    # 全局访问日志
    access_log /var/log/nginx/access.log json_log;


    # ---------- WebSocket 升级映射 ----------

    # 将 HTTP Upgrade 头映射为 Connection 头的值
    # 当客户端请求 WebSocket 时，Connection 设为 upgrade
    # 否则设为 close
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }


    # ---------- 负载均衡 upstream ----------

    # FastAPI 后端服务器组
    upstream fastapi_backend {
        # 使用最少连接算法（把请求发给当前连接数最少的后端）
        least_conn;

        # 后端实例列表
        # weight=5 表示权重为 5（处理更多请求）
        # max_fails=3 表示 30 秒内失败 3 次则标记为不可用
        # fail_timeout=30s 表示失败统计窗口为 30 秒
        server 127.0.0.1:8001 weight=5 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8002 weight=3 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8003 weight=2 max_fails=3 fail_timeout=30s;

        # 备用服务器：只在其他服务器都不可用时才接收请求
        # server 127.0.0.1:8004 backup;
    }

    # WebSocket 后端服务器组
    upstream websocket_backend {
        # WebSocket 是长连接，使用 ip_hash 确保同一客户端始终连接同一后端
        ip_hash;

        server 127.0.0.1:9001;
        server 127.0.0.1:9002;
    }


    # ===== HTTP → HTTPS 重定向 =====
    server {
        listen 80;                                    # 监听 80 端口（HTTP）
        server_name example.com www.example.com;      # 域名

        # Certbot 验证目录（Let's Encrypt 续期时需要）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 所有其他请求 301 永久重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }


    # ===== HTTPS 主配置 =====
    server {
        listen 443 ssl;                               # 监听 443 端口（HTTPS）
        server_name example.com www.example.com;      # 域名

        # ---------- SSL 证书配置 ----------

        # SSL 证书文件路径（Let's Encrypt / Certbot 自动生成）
        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        # SSL 私钥文件路径
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        # ---------- SSL 安全配置 ----------

        # 只允许 TLS 1.2 和 1.3（禁止 SSLv3、TLS 1.0、TLS 1.1）
        ssl_protocols TLSv1.2 TLSv1.3;

        # 使用高强度加密算法
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384';

        # 优先使用服务器指定的加密算法（而非客户端偏好的）
        ssl_prefer_server_ciphers on;

        # SSL 会话缓存：减少重复握手，10MB 可缓存约 4 万个会话
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS：告诉浏览器"以后永远用 HTTPS 访问此域名"
        # max-age=31536000 表示 1 年内强制 HTTPS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;


        # ---------- 反向代理 FastAPI 应用 ----------

        location /api/ {
            # 转发到 upstream 定义的 FastAPI 后端组
            proxy_pass http://fastapi_backend;

            # 传递真实客户端信息给后端
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 10s;      # 连接后端超时
            proxy_read_timeout 30s;         # 等待后端响应超时
            proxy_send_timeout 30s;         # 发送请求到后端超时

            # 后端出错时自动切换到下一个后端实例
            proxy_next_upstream error timeout http_502 http_503;

            # 限流：每秒 10 个请求，允许突发 20 个
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;
        }


        # ---------- WebSocket 代理 ----------

        location /ws/ {
            proxy_pass http://websocket_backend;

            # WebSocket 必须使用 HTTP 1.1
            proxy_http_version 1.1;

            # 传递 Upgrade 和 Connection 头（WebSocket 握手必需）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 长连接超时：默认 60s 太短，WebSocket 需要加大
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # 传递真实客户端信息
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        # ---------- 静态文件托管 ----------

        location /static/ {
            # alias 替换路径前缀
            # 请求 /static/css/style.css → 查找 /var/www/static/css/style.css
            alias /var/www/static/;

            # 缓存 30 天（静态资源变化不频繁）
            expires 30d;
            add_header Cache-Control "public, immutable";

            # 静态文件不记录访问日志（减少磁盘 IO）
            access_log off;
        }

        # 用户上传的媒体文件
        location /media/ {
            alias /var/www/media/;
            expires 7d;                     # 缓存 7 天
            access_log off;
        }


        # ---------- 健康检查接口 ----------

        location = /health {
            # 直接返回 200，不经过后端（用于监控 Nginx 本身是否存活）
            return 200 '{"status": "ok"}';
            add_header Content-Type application/json;
            access_log off;                 # 健康检查请求不记录日志
        }


        # ---------- 兜底路由 ----------

        location / {
            # 未匹配到的路径返回 404
            return 404 '{"detail": "Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
